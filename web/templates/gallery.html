<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>epaper-frame — gallery</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 0.4rem; color: #fff; letter-spacing: 0.05em; }
    .subtitle { font-size: 0.8rem; color: #555; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .card { background: #1e1e1e; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
    .card img { width: 100%; height: 130px; object-fit: cover; display: block; background: #2a2a2a; }
    .card-body { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }
    .filename { font-size: 0.75rem; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3; }
    .btn-delete {
      background: #3a1a1a; color: #f44336; border: 1px solid #5a2a2a; border-radius: 4px;
      padding: 0.3rem 0.6rem; cursor: pointer; font-family: monospace; font-size: 0.8rem;
      width: 100%; margin-top: auto;
    }
    .btn-delete:hover { background: #5a2a2a; }
    .empty { color: #555; font-size: 0.9rem; padding: 2rem 0; }
    .back { color: #888; font-size: 0.85rem; text-decoration: none; }
    .back:hover { color: #eee; }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Gallery</h1>
    <div class="subtitle">{{ photos|length }} photo{{ 's' if photos|length != 1 else '' }}</div>
  </div>
  <a class="back" href="/">← Back</a>
</div>

{% if photos %}
<div class="grid">
  {% for photo in photos %}
  <div class="card">
    <img src="/thumb/{{ photo.filename }}" alt="{{ photo.filename }}" loading="lazy">
    <div class="card-body">
      <div class="filename">{{ photo.filename }}</div>
      <form method="post" action="/delete/{{ photo.filename }}"
            onsubmit="return confirm('Delete {{ photo.filename }}?')">
        <button type="submit" class="btn-delete">Delete</button>
      </form>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="empty">No photos found in the local folder.</p>
{% endif %}

</body>
</html>
